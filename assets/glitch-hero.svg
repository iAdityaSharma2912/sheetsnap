<svg viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Distortion filter -->
    <filter id="glitch">
      <feTurbulence type="fractalNoise"
                    baseFrequency="0.002"
                    numOctaves="2"
                    result="noise">
        <animate attributeName="baseFrequency"
                 values="0.002;0.01;0.002"
                 dur="3s"
                 repeatCount="indefinite"/>
      </feTurbulence>

      <feDisplacementMap in="SourceGraphic"
                         in2="noise"
                         scale="8"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="black"/>

  <!-- Main Text -->
  <text x="50%" y="50%"
        dominant-baseline="middle"
        text-anchor="middle"
        font-family="Courier New"
        font-size="64"
        fill="#00FFB3"
        filter="url(#glitch)">
    SHEETSNAP
  </text>

  <!-- Subtitle -->
  <text x="50%" y="75%"
        dominant-baseline="middle"
        text-anchor="middle"
        font-family="Courier New"
        font-size="18"
        fill="#00FFB3"
        opacity="0.7">
    DATA INTERROGATION PROTOCOL
  </text>

</svg>
